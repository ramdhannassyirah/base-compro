stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - master

  before_script:
    # install ssh agar bisa masuk VPS
    - apt-get update -y
    - apt-get install -y openssh-client

    # load SSH key dari GitLab CI/CD Variables
    - eval $(ssh-agent -s)
    - ssh-add <(echo "$SSH_PRIVATE_KEY")

    # folder SSH
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh

  script:
    - ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "
        cd $PROJECT_PATH &&
        git pull &&
        composer install --no-dev --prefer-dist --optimize-autoloader &&
        npm install &&
        npm run build &&
        php artisan migrate --force &&
        php artisan optimize
      "
